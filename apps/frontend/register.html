<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Create your MoreCraze account and start shopping premium products."/>
  <title>Create Account — MoreCraze</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <nav id="main-nav"></nav>
  <div class="form-page">
    <div class="hero-glow g1" style="top:10%;left:5%"></div>
    <div class="hero-glow g2" style="bottom:10%;right:5%"></div>
    <div class="card form-card fade-in" style="max-width:520px">
      <h1>Create Account</h1>
      <p class="subtitle">Join MoreCraze for the best deals</p>
      <form id="register-form">
        <div class="form-row">
          <div class="form-group"><label for="name">Full Name</label><input type="text" id="name" required placeholder="John Doe"/></div>
          <div class="form-group"><label for="email">Email</label><input type="email" id="email" required placeholder="you@example.com"/></div>
        </div>
        <div class="form-group"><label for="password">Password</label><input type="password" id="password" required placeholder="Minimum 6 characters" minlength="6"/></div>
        <div class="form-group"><label for="phone">Phone</label><input type="tel" id="phone" placeholder="+1 (555) 000-0000"/></div>
        <div class="form-group"><label for="address">Address</label><input type="text" id="address" placeholder="Street address"/></div>
        <div class="form-row">
          <div class="form-group"><label for="city">City</label><input type="text" id="city" placeholder="City"/></div>
          <div class="form-group"><label for="state">State</label><input type="text" id="state" placeholder="State"/></div>
        </div>
        <div class="form-group"><label for="pincode">Pincode</label><input type="text" id="pincode" placeholder="Pincode"/></div>
        <button type="submit" class="btn btn-primary btn-block" id="btn-reg">Create Account</button>
      </form>
      <p class="form-footer">Already have an account? <a href="/login.html">Sign in</a></p>
    </div>
  </div>
  <footer id="main-footer"></footer>
  <script src="/app.js"></script>
  <script>
    initApp('register');
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-reg');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating...';
      const fields = ['name','email','password','phone','address','city','state','pincode'];
      const body = {};
      fields.forEach(f => body[f] = document.getElementById(f).value);
      try {
        const res = await api('/register', { method: 'POST', body: JSON.stringify(body) });
        if (res.success) { showToast('Account created!', 'success'); setTimeout(() => window.location.href = '/', 600); }
        else { showToast(res.error || 'Registration failed', 'error'); }
      } catch (err) { showToast(err.error || 'Registration failed', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Create Account'; }
    });
  </script>
</body>
</html>
