<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Manage your MoreCraze profile, update your details and preferences."/>
  <title>My Profile — MoreCraze</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <nav id="main-nav"></nav>
  <div class="page-wrapper">
    <div class="container">
      <div class="page-header"><h1>My <span class="text-gradient">Profile</span></h1></div>
      <div class="page-content">
        <div>
          <div class="card fade-in" id="profile-card" style="margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
              <div class="nav-avatar" style="width:64px;height:64px;font-size:1.5rem" id="avatar">?</div>
              <div><h2 id="disp-name">Loading...</h2><p style="color:var(--text-dim)" id="disp-email">—</p><p style="color:var(--text-dim);font-size:.82rem" id="disp-since">—</p></div>
            </div>
            <form id="profile-form">
              <div class="form-row">
                <div class="form-group"><label for="name">Full Name</label><input type="text" id="name" required/></div>
                <div class="form-group"><label for="phone">Phone</label><input type="tel" id="phone"/></div>
              </div>
              <div class="form-group"><label for="address">Address</label><input type="text" id="address"/></div>
              <div class="form-row">
                <div class="form-group"><label for="city">City</label><input type="text" id="city"/></div>
                <div class="form-group"><label for="state">State</label><input type="text" id="state"/></div>
              </div>
              <div class="form-group"><label for="pincode">Pincode</label><input type="text" id="pincode"/></div>
              <button type="submit" class="btn btn-primary" id="btn-save">Save Changes</button>
            </form>
          </div>
        </div>
        <div>
          <div class="card fade-in" style="animation-delay:.15s">
            <h3 style="margin-bottom:16px">Quick Links</h3>
            <a href="/orders.html" class="btn btn-secondary btn-block" style="margin-bottom:12px">📦 View Orders</a>
            <a href="/cart.html" class="btn btn-secondary btn-block" style="margin-bottom:12px">🛒 Shopping Cart</a>
            <a href="/" class="btn btn-secondary btn-block">🏠 Continue Shopping</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer id="main-footer"></footer>
  <script src="/app.js"></script>
  <script>
    async function loadProfile() {
      const u = await checkAuth();
      if (!u) { window.location.href = '/login.html'; return; }
      document.getElementById('avatar').textContent = u.name.charAt(0).toUpperCase();
      document.getElementById('disp-name').textContent = u.name;
      document.getElementById('disp-email').textContent = u.email;
      document.getElementById('disp-since').textContent = u.created_at ? 'Member since ' + new Date(u.created_at).toLocaleDateString() : '';
      ['name','phone','address','city','state','pincode'].forEach(f => { if (u[f]) document.getElementById(f).value = u[f]; });
    }
    initApp('profile').then(loadProfile);
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-save');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving...';
      const body = {};
      ['name','phone','address','city','state','pincode'].forEach(f => body[f] = document.getElementById(f).value);
      try {
        await api('/profile', { method: 'PUT', body: JSON.stringify(body) });
        showToast('Profile updated!', 'success');
        await loadProfile();
      } catch { showToast('Update failed', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
    });
  </script>
</body>
</html>
