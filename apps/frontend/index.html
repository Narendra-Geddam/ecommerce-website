<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="MoreCraze — Premium e-commerce store. Browse mobiles, laptops, books, clothing, beauty, and furniture at unbeatable prices."/>
  <title>MoreCraze — Premium Shopping Experience</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <nav id="main-nav"></nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-glow g1"></div>
    <div class="hero-glow g2"></div>
    <div class="container">
      <h1 class="fade-in">Discover <span class="text-gradient">Premium</span> Products</h1>
      <p class="fade-in" style="animation-delay:.15s">Explore our curated collection of top-quality products across electronics, fashion, beauty, and more.</p>
      <div class="search-bar fade-in" style="animation-delay:.3s">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search products..." autocomplete="off"/>
      </div>
    </div>
  </section>

  <!-- Categories -->
  <section class="container">
    <div class="cat-bar" id="cat-bar">
      <button class="cat-pill active" data-cat="All">All</button>
    </div>
  </section>

  <!-- Products -->
  <section class="container section" style="padding-top:24px">
    <div id="product-count" style="margin-bottom:20px;color:var(--text-muted);font-size:.9rem"></div>
    <div class="product-grid" id="product-grid"></div>
    <div id="loading-grid" class="product-grid">
      <div class="card skeleton" style="height:380px"></div>
      <div class="card skeleton" style="height:380px"></div>
      <div class="card skeleton" style="height:380px"></div>
      <div class="card skeleton" style="height:380px"></div>
    </div>
  </section>

  <footer id="main-footer"></footer>
  <script src="/app.js"></script>
  <script>
    let allProducts = [];
    let activeCat = 'All';

    function renderProducts(products) {
      const grid = document.getElementById('product-grid');
      document.getElementById('product-count').textContent = `${products.length} product${products.length !== 1 ? 's' : ''} found`;
      if (!products.length) {
        grid.innerHTML = '<div class="empty-state"><h2>No products found</h2><p>Try a different search or category.</p></div>';
        return;
      }
      grid.innerHTML = products.map((p, i) => `
        <div class="product-card reveal" style="transition-delay:${Math.min(i * 0.05, 0.4)}s">
          <a href="/product.html?id=${p.id}" class="product-img-link">
            <div class="product-img-wrap" data-category="${p.category}">
              <img class="product-img" src="${p.image_url}" alt="${p.name}"
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
              <div class="product-img-placeholder" style="display:none">
                <span class="placeholder-emoji">${getCategoryEmoji(p.category)}</span>
                <span class="placeholder-label">${p.category}</span>
              </div>
            </div>
          </a>
          <div class="product-body">
            <span class="product-cat">${p.category}</span>
            <a href="/product.html?id=${p.id}" class="product-name-link"><h3 class="product-name">${p.name}</h3></a>
            <p class="product-desc">${p.description || ''}</p>
            <div class="product-footer">
              <span class="product-price">${formatPrice(p.price)}</span>
              <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button>
            </div>
          </div>
        </div>
      `).join('');
      initScrollReveal();
    }

    function getCategoryEmoji(cat) {
      const map = { 'Mobiles': '📱', 'Books': '📚', 'Clothings': '👕', 'Beauty': '✨', 'Furniture': '🪑', 'Laptops': '💻' };
      return map[cat] || '📦';
    }

    function filterProducts() {
      const q = document.getElementById('search-input').value.toLowerCase();
      let filtered = allProducts;
      if (activeCat !== 'All') filtered = filtered.filter(p => p.category === activeCat);
      if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));
      renderProducts(filtered);
    }

    function renderCategories(cats) {
      const emojis = { 'All': '🛍️', 'Mobiles': '📱', 'Books': '📚', 'Clothings': '👕', 'Beauty': '✨', 'Furniture': '🪑', 'Laptops': '💻' };
      const bar = document.getElementById('cat-bar');
      bar.innerHTML = cats.map(c => `<button class="cat-pill${c === activeCat ? ' active' : ''}" data-cat="${c}">${emojis[c] || '📦'} ${c}</button>`).join('');
      bar.querySelectorAll('.cat-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCat = btn.dataset.cat;
          bar.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filterProducts();
        });
      });
    }

    async function loadData() {
      try {
        const [products, categories] = await Promise.all([
          fetch('/api/products').then(r => r.json()),
          fetch('/api/categories').then(r => r.json())
        ]);
        allProducts = products;
        renderCategories(categories);
        document.getElementById('loading-grid').style.display = 'none';

        const urlCat = new URLSearchParams(window.location.search).get('cat');
        if (urlCat && categories.includes(urlCat)) {
          activeCat = urlCat;
          renderCategories(categories);
        }
        filterProducts();
      } catch (e) {
        document.getElementById('loading-grid').innerHTML = '<div class="empty-state"><h2>Unable to load products</h2><p>Please check if the backend is running.</p></div>';
      }
    }

    document.getElementById('search-input').addEventListener('input', filterProducts);
    initApp('home').then(loadData);
  </script>
</body>
</html>
