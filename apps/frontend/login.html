<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Sign in to your MoreCraze account to track orders, manage your cart, and more."/>
  <title>Sign In — MoreCraze</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <nav id="main-nav"></nav>
  <div class="form-page">
    <div class="hero-glow g1" style="top:10%;left:5%"></div>
    <div class="hero-glow g2" style="bottom:10%;right:5%"></div>
    <div class="card form-card fade-in">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to continue shopping</p>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btn-login">Sign In</button>
      </form>
      <p class="form-footer">Don't have an account? <a href="/register.html">Create one</a></p>
    </div>
  </div>
  <footer id="main-footer"></footer>
  <script src="/app.js"></script>
  <script>
    initApp('login');
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...';
      try {
        const res = await api('/login', {
          method: 'POST',
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        if (res.success) { showToast('Welcome back!', 'success'); setTimeout(() => window.location.href = '/', 600); }
        else { showToast(res.error || 'Login failed', 'error'); }
      } catch (err) { showToast(err.error || 'Invalid credentials', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Sign In'; }
    });
  </script>
</body>
</html>
