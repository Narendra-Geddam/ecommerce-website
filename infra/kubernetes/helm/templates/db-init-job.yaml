{{- if not .Values.database.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init-job-{{ .Release.Revision }}
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "ecommerce-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        {{- include "ecommerce-app.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ecommerce-app.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:15-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for database to be ready..."
              until pg_isready -d $DATABASE_URL; do
                sleep 2
              done
              
              echo "Running schema initialization..."
              psql $DATABASE_URL -f /scripts/01_schema.sql
              
              echo "Running price updates..."
              psql $DATABASE_URL -f /scripts/02_update_prices.sql
              
              echo "Database initialization complete."
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: db-scripts
              mountPath: /scripts
      volumes:
        - name: db-scripts
          configMap:
            name: db-init-script
{{- end }}
