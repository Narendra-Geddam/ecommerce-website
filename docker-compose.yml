version: '3.8'

services:
  # Presentation Tier - Nginx Frontend
  presentation:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - SERVICE_NAME=nginx
      - SERVICE_TIER=frontend
      - REPLICAS=1
    depends_on:
      application:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ecommerce-network

  # Application Tier - Flask Backend API
  application:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://ecommerce:password@database:5432/ecommerce
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your_production_secret_key_here}
      - SERVICE_NAME=flask
      - SERVICE_TIER=backend
      - REPLICAS=1
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ecommerce-network

  # Data Tier - PostgreSQL Database
  database:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ecommerce
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ecommerce
      - SERVICE_NAME=postgres
      - SERVICE_TIER=database
      - REPLICAS=1
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./data/update_prices.sql:/docker-entrypoint-initdb.d/02_update_prices.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-data: