# External Secrets Integration with AWS Secrets Manager & Parameter Store
# Prerequisites:
# 1. Install External Secrets Operator: https://external-secrets.io/guide/installation/
# 2. Configure IRSA (IAM Roles for Service Accounts) for your EKS cluster
# 3. Create IAM role with iam-policy-external-secrets.json permissions
# 4. Annotate the service account with the IAM role ARN

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecommerce-sa
  namespace: prod-ecommerce
  annotations:
    # Replace ACCOUNT_ID and ROLE_NAME with your values
    eks.amazonaws.com/role-arn: arn:aws:iam::593067253640:role/ecommerce-external-secrets-role

---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: prod-ecommerce
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-north-1  # Change to your region
      auth:
        jwt:
          serviceAccountRef:
            name: ecommerce-sa

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ecommerce-secrets
  namespace: prod-ecommerce
spec:
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: ecommerce-secrets  # This creates/updates the Kubernetes Secret
    creationPolicy: Owner
  data:
    # Map AWS Secrets Manager secret keys to Kubernetes Secret keys
    - secretKey: DATABASE_URL
      remoteRef:
        key: ecommerce/database-url
    - secretKey: SECRET_KEY
      remoteRef:
        key: ecommerce/secret-key
    - secretKey: DOCKER_CONFIG
      remoteRef:
        key: ecommerce/docker-config

---
# Alternative: Using AWS Parameter Store
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-parameter-store
  namespace: prod-ecommerce
spec:
  provider:
    aws:
      service: ParameterStore
      region: eu-north-1  # Change to your region
      auth:
        jwt:
          serviceAccountRef:
            name: ecommerce-sa

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ecommerce-params
  namespace: prod-ecommerce
spec:
  secretStoreRef:
    name: aws-parameter-store
    kind: SecretStore
  target:
    name: ecommerce-params  # This creates/updates the Kubernetes Secret
    creationPolicy: Owner
  data:
    - secretKey: FLASK_ENV
      remoteRef:
        key: /ecommerce/flask-env
    - secretKey: DEBUG
      remoteRef:
        key: /ecommerce/debug
    - secretKey: LOG_LEVEL
      remoteRef:
        key: /ecommerce/log-level
