# Redis Configuration for E-Commerce Microservices
# Used for: session storage, cart cache, rate limiting, JWT token blacklist

# Network
bind 0.0.0.0
port 6379
protected-mode no

# General
daemonize no
pidfile /var/run/redis/redis-server.pid
logfile ""

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (for rate limiting and session data)
# Using RDB for faster restarts
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Performance
tcp-keepalive 300
timeout 0

# Security (in production, set a strong password via environment variable)
# requirepass ${REDIS_PASSWORD}

# Logging
loglevel notice

# Client connections
maxclients 10000