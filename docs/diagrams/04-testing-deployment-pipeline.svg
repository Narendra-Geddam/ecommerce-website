<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <style>
      .title{font:700 24px Arial;fill:#111827}
      .box{fill:#eef2ff;stroke:#4338ca;stroke-width:2;rx:10;ry:10}
      .gate{fill:#fef9c3;stroke:#ca8a04;stroke-width:2;rx:10;ry:10}
      .ok{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:10;ry:10}
      .bad{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:10;ry:10}
      .txt{font:600 14px Arial;fill:#111827}
      .arrow{stroke:#374151;stroke-width:2;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker>
  </defs>

  <text x="24" y="36" class="title">Complete Testing and Deployment Pipeline</text>

  <rect x="80" y="90" width="180" height="60" class="box"/><text x="130" y="126" class="txt">Git Push</text>
  <rect x="320" y="90" width="180" height="60" class="box"/><text x="368" y="126" class="txt">Jenkins</text>
  <rect x="560" y="90" width="200" height="60" class="box"/><text x="620" y="126" class="txt">Run Tests</text>
  <rect x="820" y="90" width="220" height="60" class="box"/><text x="875" y="126" class="txt">Build Images</text>

  <line x1="260" y1="120" x2="320" y2="120" class="arrow"/>
  <line x1="500" y1="120" x2="560" y2="120" class="arrow"/>
  <line x1="760" y1="120" x2="820" y2="120" class="arrow"/>

  <rect x="220" y="220" width="240" height="70" class="gate"/><text x="255" y="262" class="txt">Security Scan (Trivy)</text>
  <rect x="520" y="220" width="240" height="70" class="box"/><text x="590" y="262" class="txt">Push Registry</text>
  <rect x="820" y="220" width="280" height="70" class="box"/><text x="870" y="262" class="txt">Update Helm Values</text>

  <line x1="930" y1="150" x2="340" y2="220" class="arrow"/>
  <line x1="460" y1="255" x2="520" y2="255" class="arrow"/>
  <line x1="760" y1="255" x2="820" y2="255" class="arrow"/>

  <rect x="150" y="360" width="280" height="74" class="ok"/><text x="195" y="404" class="txt">Canary Strategy</text>
  <rect x="470" y="360" width="280" height="74" class="ok"/><text x="520" y="404" class="txt">Blue/Green Strategy</text>
  <rect x="790" y="360" width="280" height="74" class="ok"/><text x="850" y="404" class="txt">Rolling Strategy</text>

  <line x1="960" y1="290" x2="290" y2="360" class="arrow"/>
  <line x1="960" y1="290" x2="610" y2="360" class="arrow"/>
  <line x1="960" y1="290" x2="930" y2="360" class="arrow"/>

  <rect x="290" y="530" width="260" height="74" class="ok"/><text x="350" y="574" class="txt">Health Checks</text>
  <rect x="650" y="530" width="260" height="74" class="bad"/><text x="730" y="574" class="txt">Rollback</text>

  <line x1="290" y1="434" x2="420" y2="530" class="arrow"/>
  <line x1="610" y1="434" x2="420" y2="530" class="arrow"/>
  <line x1="930" y1="434" x2="420" y2="530" class="arrow"/>

  <line x1="550" y1="567" x2="650" y2="567" class="arrow"/>
  <text x="320" y="700" class="txt">Pipeline gates: Tests -> Scan -> Deploy Strategy -> Health -> Promote or Rollback</text>
</svg>
