<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title{font:700 24px Arial;fill:#111827}
      .box{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:8;ry:8}
      .sub{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:8;ry:8}
      .txt{font:600 14px Arial;fill:#111827}
      .line{stroke:#374151;stroke-width:2}
    </style>
  </defs>
  <text x="24" y="36" class="title">Folder Structure and Component Hierarchy</text>

  <rect x="470" y="70" width="250" height="56" class="box"/><text x="536" y="104" class="txt">e-commerce</text>

  <rect x="80" y="180" width="140" height="52" class="box"/><text x="120" y="212" class="txt">apps</text>
  <rect x="260" y="180" width="140" height="52" class="box"/><text x="303" y="212" class="txt">infra</text>
  <rect x="440" y="180" width="140" height="52" class="box"/><text x="478" y="212" class="txt">ci-cd</text>
  <rect x="620" y="180" width="140" height="52" class="box"/><text x="668" y="212" class="txt">docs</text>
  <rect x="800" y="180" width="140" height="52" class="box"/><text x="846" y="212" class="txt">data</text>
  <rect x="980" y="180" width="140" height="52" class="box"/><text x="1026" y="212" class="txt">tests</text>

  <line x1="595" y1="126" x2="150" y2="180" class="line"/>
  <line x1="595" y1="126" x2="330" y2="180" class="line"/>
  <line x1="595" y1="126" x2="510" y2="180" class="line"/>
  <line x1="595" y1="126" x2="690" y2="180" class="line"/>
  <line x1="595" y1="126" x2="870" y2="180" class="line"/>
  <line x1="595" y1="126" x2="1050" y2="180" class="line"/>

  <rect x="40" y="300" width="220" height="70" class="sub"/><text x="62" y="342" class="txt">apps/backend (Flask)</text>
  <rect x="40" y="390" width="220" height="70" class="sub"/><text x="56" y="432" class="txt">apps/frontend (Nginx)</text>

  <rect x="280" y="300" width="220" height="70" class="sub"/><text x="315" y="342" class="txt">infra/kubernetes</text>
  <rect x="280" y="390" width="220" height="70" class="sub"/><text x="333" y="432" class="txt">infra/terraform</text>

  <rect x="520" y="300" width="220" height="70" class="sub"/><text x="566" y="342" class="txt">jenkins/Jenkinsfile</text>
  <rect x="760" y="300" width="220" height="70" class="sub"/><text x="834" y="342" class="txt">schema.sql</text>
  <rect x="1000" y="300" width="160" height="70" class="sub"/><text x="1047" y="342" class="txt">pytest</text>

  <line x1="150" y1="232" x2="150" y2="300" class="line"/>
  <line x1="150" y1="232" x2="150" y2="390" class="line"/>
  <line x1="330" y1="232" x2="390" y2="300" class="line"/>
  <line x1="330" y1="232" x2="390" y2="390" class="line"/>
  <line x1="510" y1="232" x2="630" y2="300" class="line"/>
  <line x1="870" y1="232" x2="870" y2="300" class="line"/>
  <line x1="1050" y1="232" x2="1080" y2="300" class="line"/>

  <rect x="240" y="560" width="290" height="70" class="box"/><text x="292" y="602" class="txt">Runtime: Frontend -> Backend</text>
  <rect x="640" y="560" width="290" height="70" class="box"/><text x="680" y="602" class="txt">Backend -> PostgreSQL</text>
