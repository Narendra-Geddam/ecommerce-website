<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title{font:700 24px Arial;fill:#1f2937}
      .node{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10;ry:10}
      .node2{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:10;ry:10}
      .txt{font:600 14px Arial;fill:#111827}
      .arrow{stroke:#374151;stroke-width:2;fill:none;marker-end:url(#m)}
      .small{font:12px Arial;fill:#4b5563}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="24" y="36" class="title">Complete Workflow and Architecture</text>

  <rect x="40" y="80" width="180" height="56" class="node"/><text x="62" y="114" class="txt">Developer Push</text>
  <rect x="280" y="80" width="180" height="56" class="node"/><text x="323" y="114" class="txt">GitHub Repo</text>
  <rect x="520" y="80" width="180" height="56" class="node"/><text x="556" y="114" class="txt">Jenkins CI</text>
  <rect x="760" y="80" width="180" height="56" class="node"/><text x="803" y="114" class="txt">Build + Scan</text>
  <rect x="980" y="80" width="180" height="56" class="node"/><text x="1002" y="114" class="txt">Docker Hub</text>

  <line x1="220" y1="108" x2="280" y2="108" class="arrow"/>
  <line x1="460" y1="108" x2="520" y2="108" class="arrow"/>
  <line x1="700" y1="108" x2="760" y2="108" class="arrow"/>
  <line x1="940" y1="108" x2="980" y2="108" class="arrow"/>

  <rect x="200" y="220" width="230" height="64" class="node2"/><text x="231" y="258" class="txt">Update Helm Values</text>
  <rect x="500" y="220" width="230" height="64" class="node2"/><text x="543" y="258" class="txt">ArgoCD Sync</text>
  <rect x="800" y="220" width="300" height="64" class="node2"/><text x="842" y="258" class="txt">Deploy to EKS</text>

  <line x1="1070" y1="136" x2="910" y2="220" class="arrow"/>
  <line x1="430" y1="252" x2="500" y2="252" class="arrow"/>
  <line x1="730" y1="252" x2="800" y2="252" class="arrow"/>

  <rect x="120" y="360" width="220" height="70" class="node"/><text x="151" y="402" class="txt">Nginx Frontend x3</text>
  <rect x="420" y="360" width="220" height="70" class="node"/><text x="460" y="402" class="txt">Flask Backend x3</text>
  <rect x="720" y="360" width="220" height="70" class="node"/><text x="760" y="402" class="txt">PostgreSQL</text>
  <rect x="980" y="360" width="180" height="70" class="node"/><text x="1005" y="402" class="txt">Monitoring</text>

  <line x1="890" y1="284" x2="230" y2="360" class="arrow"/>
  <line x1="910" y1="284" x2="530" y2="360" class="arrow"/>
  <line x1="940" y1="284" x2="830" y2="360" class="arrow"/>

  <line x1="340" y1="395" x2="420" y2="395" class="arrow"/>
  <line x1="640" y1="395" x2="720" y2="395" class="arrow"/>
  <line x1="940" y1="395" x2="980" y2="395" class="arrow"/>

  <rect x="280" y="520" width="280" height="70" class="node2"/><text x="304" y="562" class="txt">AWS Secrets Manager</text>
  <rect x="640" y="520" width="280" height="70" class="node2"/><text x="672" y="562" class="txt">AWS Parameter Store</text>

  <line x1="470" y1="430" x2="420" y2="520" class="arrow"/>
  <line x1="580" y1="430" x2="780" y2="520" class="arrow"/>

  <text x="24" y="724" class="small">Flow: Code - CI - Registry - GitOps - Kubernetes - Secrets - Monitoring</text>
