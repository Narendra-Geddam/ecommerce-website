<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title{font:700 24px Arial;fill:#111827}
      .n1{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:10;ry:10}
      .n2{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:10;ry:10}
      .n3{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10;ry:10}
      .txt{font:600 14px Arial;fill:#111827}
      .arrow{stroke:#374151;stroke-width:2;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker>
  </defs>

  <text x="24" y="36" class="title">Observability and Canary Deployment Architecture</text>

  <rect x="460" y="80" width="280" height="64" class="n2"/><text x="505" y="118" class="txt">Flask Backend Instrumented</text>

  <rect x="120" y="220" width="220" height="64" class="n1"/><text x="177" y="258" class="txt">Prometheus</text>
  <rect x="390" y="220" width="220" height="64" class="n1"/><text x="481" y="258" class="txt">Loki</text>
  <rect x="660" y="220" width="220" height="64" class="n1"/><text x="747" y="258" class="txt">Jaeger</text>
  <rect x="930" y="220" width="180" height="64" class="n1"/><text x="980" y="258" class="txt">Grafana</text>

  <line x1="520" y1="144" x2="230" y2="220" class="arrow"/>
  <line x1="580" y1="144" x2="500" y2="220" class="arrow"/>
  <line x1="640" y1="144" x2="770" y2="220" class="arrow"/>
  <line x1="340" y1="252" x2="930" y2="252" class="arrow"/>

  <rect x="220" y="380" width="300" height="76" class="n3"/><text x="270" y="425" class="txt">Stable Pods (95% traffic)</text>
  <rect x="640" y="380" width="300" height="76" class="n3"/><text x="690" y="425" class="txt">Canary Pods (5% traffic)</text>

  <rect x="440" y="540" width="320" height="76" class="n2"/><text x="500" y="585" class="txt">Automatic Decision Engine</text>

  <line x1="1020" y1="284" x2="790" y2="380" class="arrow"/>
  <line x1="1020" y1="284" x2="370" y2="380" class="arrow"/>
  <line x1="370" y1="456" x2="520" y2="540" class="arrow"/>
  <line x1="790" y1="456" x2="680" y2="540" class="arrow"/>

  <text x="460" y="660" class="txt">If SLO fails -> rollback canary | If healthy -> increase canary traffic</text>
</svg>
