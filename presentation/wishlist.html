<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - ShopEasy</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; margin: 0; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 2rem; }
        .header-content { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        nav a, .logo { color: white; text-decoration: none; margin-left: 12px; }
        main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); overflow: hidden; }
        .card img { width: 100%; height: 220px; object-fit: cover; background: #f0f0f0; }
        .card-content { padding: 16px; }
        .btn { width: 100%; margin-top: 10px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .primary { background: #667eea; color: white; }
        .secondary { background: #eef1ff; color: #4b5fd1; }
        .empty, .login { background: white; border-radius: 16px; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a class="logo" href="/">ShopEasy</a>
            <nav>
                <a href="/">Home</a>
                <a href="/cart.html">Cart</a>
                <a href="/orders.html">Orders</a>
            </nav>
        </div>
    </header>
    <main id="main-content"><div class="empty">Loading wishlist...</div></main>
    <script>
        const API_URL = '/api';
        function getAuthHeaders() {
            const token = localStorage.getItem('access_token');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }
        async function getCsrfToken() {
            const cached = sessionStorage.getItem('csrf_token');
            if (cached) return cached;
            const response = await fetch(`${API_URL}/csrf-token`, { credentials: 'include' });
            const data = await response.json();
            sessionStorage.setItem('csrf_token', data.csrf_token);
            return data.csrf_token;
        }
        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[char]));
        }
        async function loadWishlist() {
            const me = await fetch(`${API_URL}/me`, { headers: getAuthHeaders(), credentials: 'include' }).then(r => r.json());
            const main = document.getElementById('main-content');
            if (!me.authenticated) {
                main.innerHTML = '<div class="login"><h2>Please login to view your wishlist</h2><p><a href="/login.html">Login</a></p></div>';
                return;
            }
            const data = await fetch(`${API_URL}/wishlist`, { headers: getAuthHeaders(), credentials: 'include' }).then(r => r.json());
            if (!data.items || data.items.length === 0) {
                main.innerHTML = '<div class="empty"><h2>Your wishlist is empty</h2><p>Save items from the homepage to see them here.</p></div>';
                return;
            }
            main.innerHTML = `<h1>My Wishlist</h1><div class="grid">${data.items.map(item => `
                <div class="card">
                    <img src="${escapeHtml(item.image_url || '')}" alt="${escapeHtml(item.name)}">
                    <div class="card-content">
                        <h3>${escapeHtml(item.name)}</h3>
                        <p>$${Number(item.price).toFixed(2)}</p>
                        <button class="btn primary" onclick="location.href='/cart.html'">Go to Cart</button>
                        <button class="btn secondary" onclick="removeItem(${item.id})">Remove</button>
                    </div>
                </div>
            `).join('')}</div>`;
        }
        async function removeItem(productId) {
            await fetch(`${API_URL}/wishlist/remove/${productId}`, {
                method: 'POST',
                headers: { ...getAuthHeaders(), 'X-CSRF-Token': await getCsrfToken(), 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({})
            });
            loadWishlist();
        }
        loadWishlist();
    </script>
</body>
</html>
