server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:*;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Health check endpoint - returns 200 if nginx is running
    location = /health {
        default_type application/json;
        return 200 '{"status":"healthy","service":"nginx","tier":"frontend"}';
    }

    # Liveness check for nginx itself
    location = /live {
        default_type application/json;
        return 200 '{"status":"alive","service":"nginx"}';
    }

    # Serve static files
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        alias /usr/share/nginx/html/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Monitor page
    location /monitor {
        try_files /monitor.html =404;
    }

    # Monitor endpoints - direct to legacy backend (not migrated yet)
    location /api/monitor {
        proxy_pass http://application:5000/api/monitor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============ LEGACY FALLBACK (for backward compatibility during migration) ============
    # These can be removed once frontend is updated to use JWT tokens

    # Route all other API calls through the gateway so new endpoints do not
    # accidentally fall back to index.html when features expand.
    location /api/ {
        proxy_pass http://gateway:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Serve HTML files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
