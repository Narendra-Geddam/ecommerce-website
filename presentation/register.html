<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ShopEasy</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .register-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .register-header p {
            opacity: 0.9;
        }

        .register-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .register-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-msg {
            background: #efe;
            color: #3c3;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <a href="/" class="back-home">← Back to Shop</a>

    <div class="register-container">
        <div class="register-header">
            <h1>Create Account</h1>
            <p>Join ShopEasy and start shopping</p>
        </div>

        <form class="register-form" id="registerForm">
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required minlength="6">
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="10-digit mobile number">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city" placeholder="City">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" id="state" placeholder="State">
                </div>
            </div>

            <div class="form-group">
                <label>Pincode</label>
                <input type="text" id="pincode" placeholder="6-digit pincode">
            </div>

            <button type="submit" class="register-btn" id="registerBtn">
                Create Account <span class="loading-spinner" id="spinner"></span>
            </button>

            <div class="form-footer">
                Already have an account? <a href="/login.html">Login</a>
            </div>
        </form>
    </div>

    <script>
        const API_URL = '/api';

        function storeAuth(data) {
            if (data.access_token) {
                localStorage.setItem('access_token', data.access_token);
            }
            if (data.refresh_token) {
                localStorage.setItem('refresh_token', data.refresh_token);
            }
        }

        function getAuthHeaders() {
            const token = localStorage.getItem('access_token');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        function clearAuth() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
        }

        async function getCsrfToken(forceRefresh = false) {
            if (forceRefresh) {
                sessionStorage.removeItem('csrf_token');
            }

            const cached = sessionStorage.getItem('csrf_token');
            if (cached) {
                return cached;
            }

            const response = await fetch(`${API_URL}/csrf-token`, { credentials: 'include' });
            const data = await readJsonResponse(response, 'Failed to load CSRF token');
            sessionStorage.setItem('csrf_token', data.csrf_token);
            return data.csrf_token;
        }

        async function postWithCsrf(url, body) {
            let csrfToken = await getCsrfToken();
            let response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': csrfToken
                },
                credentials: 'include',
                body: JSON.stringify(body)
            });

            if (response.status === 403) {
                csrfToken = await getCsrfToken(true);
                response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfToken
                    },
                    credentials: 'include',
                    body: JSON.stringify(body)
                });
            }

            return response;
        }

        async function readJsonResponse(response, fallbackMessage) {
            const contentType = response.headers.get('content-type') || '';
            if (!contentType.includes('application/json')) {
                const text = await response.text();
                throw new Error(`${fallbackMessage}. Received ${contentType || 'unknown content type'}: ${text.slice(0, 80)}`);
            }

            return await response.json();
        }

        function validateRegistrationForm({ name, email, password, phone, pincode }) {
            const normalizedPhone = String(phone || '').replace(/\D/g, '');
            const normalizedPincode = String(pincode || '').replace(/\D/g, '');

            if (String(name || '').trim().length < 2) {
                return 'Name must be at least 2 characters';
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim())) {
                return 'Enter a valid email address';
            }
            if (String(password || '').length < 8 || !/[A-Za-z]/.test(password) || !/\d/.test(password)) {
                return 'Password must be at least 8 characters and include a letter and a number';
            }
            if (normalizedPhone && !/^\d{10}$/.test(normalizedPhone)) {
                return 'Phone number must be 10 digits';
            }
            if (normalizedPincode && !/^\d{6}$/.test(normalizedPincode)) {
                return 'Pincode must be 6 digits';
            }
            return null;
        }

        async function mergeGuestCart() {
            const guestCartId = localStorage.getItem('cart_id');
            if (!guestCartId) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/cart/merge`, {
                    method: 'POST',
                    headers: {
                        ...getAuthHeaders(),
                        'X-CSRF-Token': await getCsrfToken(),
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ guest_cart_id: guestCartId })
                });

                const result = await readJsonResponse(response, 'Failed to merge guest cart');
                if (result.success && result.cart_id) {
                    localStorage.setItem('cart_id', result.cart_id);
                }
            } catch (error) {
                console.error('Cart merge failed:', error);
            }
        }

        // Check if already logged in
        async function checkAuth() {
            try {
                const response = await fetch(`${API_URL}/me`, {
                    credentials: 'include',
                    headers: getAuthHeaders()
                });
                const data = await readJsonResponse(response, 'Failed to load auth state');
                if (data.authenticated) {
                    window.location.href = '/';
                }
            } catch (e) {
                clearAuth();
            }
        }
        checkAuth();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;
            const pincode = document.getElementById('pincode').value;

            const btn = document.getElementById('registerBtn');
            const spinner = document.getElementById('spinner');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            btn.disabled = true;
            spinner.style.display = 'inline-block';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const validationError = validateRegistrationForm({ name, email, password, phone, pincode });
            if (validationError) {
                errorMsg.textContent = validationError;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                spinner.style.display = 'none';
                return;
            }

            try {
                const response = await postWithCsrf(`${API_URL}/register`, {
                    name, email, password, phone, city, state, pincode
                });

                const data = await readJsonResponse(response, 'Registration failed');

                if (data.success) {
                    storeAuth(data);
                    await mergeGuestCart();
                    successMsg.textContent = 'Account created! Redirecting...';
                    successMsg.style.display = 'block';
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    errorMsg.textContent = data.error || 'Registration failed';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
            }

            btn.disabled = false;
            spinner.style.display = 'none';
        });
    </script>
</body>
</html>
