{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "ecommerce-app.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.awsRegion }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "ecommerce-app.serviceAccountName" . }}

---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-parameter-store
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "ecommerce-app.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.awsRegion }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "ecommerce-app.serviceAccountName" . }}

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ecommerce-secrets
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "ecommerce-app.labels" . | nindent 4 }}
spec:
  refreshPolicy: {{ .Values.externalSecrets.refreshPolicy }}
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: ecommerce-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "ecommerce-app.labels" . | nindent 10 }}
      data:
        DATABASE_URL: "{{ `{{ .database_url }}` }}"
        SECRET_KEY: "{{ `{{ .secret_key }}` }}"
        DOCKER_CONFIG: "{{ `{{ .docker_config }}` }}"
  data:
    - secretKey: database_url
      remoteRef:
        key: ecommerce/database-url
    - secretKey: secret_key
      remoteRef:
        key: ecommerce/secret-key
    - secretKey: docker_config
      remoteRef:
        key: ecommerce/docker-config

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ecommerce-params
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    {{- include "ecommerce-app.labels" . | nindent 4 }}
spec:
  refreshPolicy: {{ .Values.externalSecrets.refreshPolicy }}
  secretStoreRef:
    name: aws-parameter-store
    kind: SecretStore
  target:
    name: ecommerce-params
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "ecommerce-app.labels" . | nindent 10 }}
      data:
        FLASK_ENV: "{{ `{{ .flask_env }}` }}"
        DEBUG_MODE: "{{ `{{ .debug_mode }}` }}"
        LOG_LEVEL: "{{ `{{ .log_level }}` }}"
  data:
    - secretKey: flask_env
      remoteRef:
        key: /ecommerce/flask-env
    - secretKey: debug_mode
      remoteRef:
        key: /ecommerce/debug
    - secretKey: log_level
      remoteRef:
        key: /ecommerce/log-level
{{- end }}
